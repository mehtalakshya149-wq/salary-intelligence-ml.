# ============================================================
# ML Pipeline Configuration — Salary Intelligence Platform
# ============================================================

# ── Data Paths ──────────────────────────────────────────────
paths:
  raw_data: "ml/data/raw/salaries.csv"
  processed_data: "ml/data/processed/salaries_clean.csv"
  schema: "ml/data/schema.json"
  model_dir: "ml/models/trained"
  metadata_dir: "ml/models/metadata"
  encoder_path: "ml/models/trained/encoder.joblib"
  scaler_path: "ml/models/trained/scaler.joblib"
  shap_dir: "ml/models/metadata/shap"

# ── Feature Definitions ────────────────────────────────────
features:
  categorical:
    - job_title
    - experience_level
    - employment_type
    - company_location
    - company_size
    - skills
  numeric:
    - remote_ratio
    - work_year
  target: salary_in_usd

# ── Role Clusters (job_title → macro-category) ────────────
role_clusters:
  Engineer:
    - data engineer
    - ml engineer
    - machine learning engineer
    - mlops engineer
    - analytics engineer
    - etl developer
    - big data engineer
  Analyst:
    - data analyst
    - business analyst
    - bi analyst
    - business intelligence
    - financial data analyst
  Scientist:
    - data scientist
    - research scientist
    - applied scientist
    - data science manager
    - nlp engineer
  Manager:
    - data manager
    - head of data
    - director of data
    - data lead
    - data architect
  Other: []   # Catch-all for unmatched titles

# ── Model Hyperparameters ──────────────────────────────────
models:
  random_forest:
    n_estimators: 300
    max_depth: 20
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: "sqrt"
    random_state: 42
    n_jobs: -1

  gradient_boosting:
    n_estimators: 200
    learning_rate: 0.08
    max_depth: 6
    min_samples_split: 5
    min_samples_leaf: 3
    subsample: 0.8
    random_state: 42

# ── Ensemble Configuration ─────────────────────────────────
ensemble:
  method: "voting"            # "voting" (VotingRegressor)
  weights:
    random_forest: 0.6
    gradient_boosting: 0.4

# ── Training Configuration ─────────────────────────────────
training:
  test_size: 0.2
  random_state: 42
  cross_validation_folds: 5

# ── Prediction Settings ────────────────────────────────────
prediction:
  percentile_low: 10          # Minimum salary estimate
  percentile_high: 90         # Maximum salary estimate
  confidence:
    high_threshold: 85        # Confidence ≥ 85 → "High"
    medium_threshold: 60      # Confidence ≥ 60 → "Medium"

# ── Inflation Rates (CPI-based, approx. annual %) ─────────
inflation:
  base_year: 2026
  rates:
    2020: 1.23
    2021: 4.70
    2022: 8.00
    2023: 4.12
    2024: 2.95
    2025: 2.50
    2026: 0.00   # Current year — no adjustment

# ── Bias Detection ─────────────────────────────────────────
bias:
  group_columns:
    - company_location
    - company_size
  max_metric_gap: 0.15       # Flag if R² gap between groups > 15%

# ── Drift Detection ────────────────────────────────────────
drift:
  year_column: work_year
  r2_drop_threshold: 0.10    # Flag if latest-year R² drops > 10% vs prior
